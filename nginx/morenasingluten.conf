server {
    listen 80;
    server_name morenasingluten.ar www.morenasingluten.ar;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/static/;
        expires 30d;
    }

    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
    }

    location /images/ {
        alias /app/images/;
        expires 30d;
    }
}
