# Platform.sh app config — Morena Sin Gluten (Flask + PostgreSQL)
# Docs: https://docs.platform.sh/configuration/app.html

name: morena
type: python:3.11

# Build hook: install dependencies
hooks:
    build: |
        pip install --upgrade pip
        pip install -r requirements.txt

# PostgreSQL service relationship
relationships:
    database: "db:postgresql"

# Web server: gunicorn listening on Platform.sh socket
web:
    commands:
        start: gunicorn -w 4 -b $SOCKET app:app
    locations:
        "/":
            passthru: true
            allow: false
        "/static":
            root: "static"
            allow: true
            expires: 30d
        "/uploads":
            root: "uploads"
            allow: true
            expires: 7d
        "/images":
            root: "images"
            allow: true
            expires: 30d

# Writable mounts for user uploads
mounts:
    "uploads":
        source: local
        source_path: uploads
    "images":
        source: local
        source_path: images

# Default env vars (secrets set via Platform.sh console)
variables:
    env:
        FLASK_ENV: production
        SESSION_COOKIE_SECURE: "true"
