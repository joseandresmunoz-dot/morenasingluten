{% extends "base.html" %}
{% block title %}Registro - Morena Sin Gluten{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm card-morena">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4"><i class="bi bi-heart-fill text-rosa"></i> Crear Cuenta</h3>

                    <a href="{{ url_for('auth.google_login') }}" class="btn btn-outline-dark w-100 mb-3">
                        <svg width="18" height="18" viewBox="0 0 48 48" class="me-2">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        </svg>
                        Registrarse con Google
                    </a>

                    <div class="text-center mb-3">
                        <span class="text-muted">— o completá el formulario —</span>
                    </div>

                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" name="nombre" class="form-control" value="{{ nombre|default('') }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" value="{{ email|default('') }}" required>
                            <small class="text-muted">Este será también tu usuario.</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">WhatsApp</label>
                            <input type="tel" name="whatsapp" class="form-control" value="{{ whatsapp|default('') }}" placeholder="+54 9 ..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Domicilio <small class="text-muted">(opcional)</small></label>
                            <input type="text" name="direccion" class="form-control" value="{{ direccion|default('') }}" placeholder="Calle, número, piso/depto, localidad">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password" class="form-control" minlength="6" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Repetir Contraseña</label>
                            <input type="password" name="password2" class="form-control" minlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-morena w-100">Crear Cuenta</button>
                    </form>

                    <p class="text-center text-muted mt-3">
                        ¿Ya tenés cuenta? <a href="{{ url_for('auth.login') }}">Iniciá sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
