{% extends "admin/base_admin.html" %}
{% block title %}Calendario - Admin{% endblock %}
{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
{% endblock %}
{% block content %}
<h3 class="mb-4"><i class="bi bi-calendar3"></i> Calendario de Pedidos</h3>

<div class="card">
    <div class="card-body">
        <div id="calendar"></div>
    </div>
</div>

<!-- Modal agregar evento -->
<div class="modal fade" id="eventModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="eventModalTitle">Nuevo Evento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Título</label>
                    <input type="text" id="eventTitle" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea id="eventDesc" class="form-control" rows="2"></textarea>
                </div>
                <div class="row g-2">
                    <div class="col-6">
                        <label class="form-label">Inicio</label>
                        <input type="datetime-local" id="eventStart" class="form-control">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Fin</label>
                        <input type="datetime-local" id="eventEnd" class="form-control">
                    </div>
                </div>
                <div class="mt-3">
                    <label class="form-label">Color</label>
                    <input type="color" id="eventColor" class="form-control form-control-color" value="#8B4513">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" id="deleteEventBtn" class="btn btn-danger d-none">Eliminar</button>
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" id="saveEventBtn" class="btn btn-morena">Guardar</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script>
const csrfToken = '{{ csrf_token() }}';
let editingEventId = null;

document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'es',
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,listWeek'
        },
        events: '/admin/api/calendar/events',
        editable: true,
        selectable: true,
        dateClick: function(info) {
            editingEventId = null;
            document.getElementById('eventModalTitle').textContent = 'Nuevo Evento';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDesc').value = '';
            document.getElementById('eventStart').value = info.dateStr + 'T09:00';
            document.getElementById('eventEnd').value = '';
            document.getElementById('eventColor').value = '#8B4513';
            document.getElementById('deleteEventBtn').classList.add('d-none');
            new bootstrap.Modal(document.getElementById('eventModal')).show();
        },
        eventClick: function(info) {
            editingEventId = info.event.id;
            document.getElementById('eventModalTitle').textContent = 'Editar Evento';
            document.getElementById('eventTitle').value = info.event.title;
            document.getElementById('eventDesc').value = info.event.extendedProps.descripcion || '';
            document.getElementById('eventStart').value = info.event.start ? info.event.start.toISOString().slice(0, 16) : '';
            document.getElementById('eventEnd').value = info.event.end ? info.event.end.toISOString().slice(0, 16) : '';
            document.getElementById('eventColor').value = info.event.backgroundColor || '#8B4513';
            document.getElementById('deleteEventBtn').classList.remove('d-none');
            new bootstrap.Modal(document.getElementById('eventModal')).show();
        },
        eventDrop: function(info) {
            fetch(`/admin/api/calendar/events/${info.event.id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrfToken},
                body: JSON.stringify({
                    start: info.event.start.toISOString(),
                    end: info.event.end ? info.event.end.toISOString() : null
                })
            });
        }
    });
    calendar.render();

    document.getElementById('saveEventBtn').addEventListener('click', function() {
        const data = {
            title: document.getElementById('eventTitle').value,
            descripcion: document.getElementById('eventDesc').value,
            start: document.getElementById('eventStart').value,
            end: document.getElementById('eventEnd').value,
            color: document.getElementById('eventColor').value
        };

        if (!data.title || !data.start) { alert('Título y fecha son obligatorios'); return; }

        const url = editingEventId
            ? `/admin/api/calendar/events/${editingEventId}`
            : '/admin/api/calendar/events';
        const method = editingEventId ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrfToken},
            body: JSON.stringify(data)
        }).then(() => {
            bootstrap.Modal.getInstance(document.getElementById('eventModal')).hide();
            calendar.refetchEvents();
        });
    });

    document.getElementById('deleteEventBtn').addEventListener('click', function() {
        if (editingEventId && confirm('¿Eliminar este evento?')) {
            fetch(`/admin/api/calendar/events/${editingEventId}`, {
                method: 'DELETE',
                headers: {'X-CSRFToken': csrfToken}
            }).then(() => {
                bootstrap.Modal.getInstance(document.getElementById('eventModal')).hide();
                calendar.refetchEvents();
            });
        }
    });
});
</script>
{% endblock %}
