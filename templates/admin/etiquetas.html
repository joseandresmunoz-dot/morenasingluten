{% extends "admin/base_admin.html" %}
{% block title %}Etiquetas - Admin{% endblock %}
{% block content %}
<h3 class="mb-4">Etiquetas</h3>

<div class="row g-4">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header"><h6 class="mb-0">Nueva Etiqueta</h6></div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-2">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Color</label>
                        <input type="color" name="color" class="form-control form-control-color" value="#8B4513">
                    </div>
                    <button type="submit" class="btn btn-morena btn-sm w-100">Crear</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="d-flex flex-wrap gap-3">
            {% for tag in tags %}
            <div class="card" style="min-width: 200px;">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <span class="badge" style="background-color: {{ tag.color }}; font-size: 0.9rem;">{{ tag.nombre }}</span>
                    <form method="POST" action="{{ url_for('admin.tag_delete', tag_id=tag.id) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Eliminar esta etiqueta?')"><i class="bi bi-x"></i></button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
