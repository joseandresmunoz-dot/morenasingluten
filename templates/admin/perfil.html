{% extends "admin/base_admin.html" %}
{% block title %}Mi Perfil - Admin{% endblock %}
{% block content %}
<h3 class="mb-4">Mi Perfil</h3>

<div class="row">
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Datos de la cuenta</h5>
                <p><strong>Nombre:</strong> {{ current_user.nombre }}</p>
                <p><strong>Email:</strong> {{ current_user.email }}</p>
                <p><strong>Rol:</strong> Administrador</p>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Cambiar Contraseña</h5>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Contraseña actual</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nueva contraseña</label>
                        <input type="password" name="new_password" class="form-control" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirmar nueva contraseña</label>
                        <input type="password" name="confirm_password" class="form-control" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-morena">Actualizar Contraseña</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
